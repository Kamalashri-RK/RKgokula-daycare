{% extends 'base.html' %}

{% block content %}

<div class="big-container">
<div class="container edit-container">

<div class="edit-header">
<h3>Edit Enquiry</h3>
</div>

<div class="edit-form">

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>Parent Name</label>
<input type="text" name="parent_name" value="{{data.parent_name}}" class="form-control">
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone" value="{{data.phone}}" class="form-control">
</div>

<div class="mb-3">
<label>Child Name</label>
<input type="text" name="child_name" value="{{data.child_name}}" class="form-control">
</div>

<div class="mb-3">
<label>City</label>
<input type="text" name="city" value="{{data.city}}" class="form-control">
</div>

<div class="mb-3">
<label>Age Group</label>

<select name="age_group" class="form-control">

<option {% if data.age_group == "Infant" %}selected{% endif %}>Infant</option>
<option {% if data.age_group == "Toddler" %}selected{% endif %}>Toddler</option>
<option {% if data.age_group == "Playgroup" %}selected{% endif %}>Playgroup</option>
<option {% if data.age_group == "After School" %}selected{% endif %}>After School</option>

</select>

</div>

<div class="mb-3">
<label>Message</label>
<textarea name="message" class="form-control">{{data.message}}</textarea>
</div>

<div class="d-grid gap-2 d-sm-flex justify-content-sm-center mt-4">

<button class="btn btn-success">Update</button>

<a href="/dashboard" class="btn btn-primary">Cancel</a>

</div>

</form>

</div>

</div>
</div>

{% endblock %}
